name: Bug report
description: Report reproducible incorrect behavior in Weeklight.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Remove project names, notes, and other private information before attaching screenshots or logs.

  - type: input
    id: version
    attributes:
      label: Weeklight version
      placeholder: 1.0.0 or commit SHA
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version and Mac architecture
      placeholder: macOS 15.6, Apple Silicon
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Describe the smallest reliable sequence that triggers the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized screenshots, logs, or timing details if useful.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed private project information and credentials.
          required: true
        - label: This is not a security vulnerability.
          required: true
