name: Feature request
description: Suggest a focused improvement to Weeklight.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is difficult today, and who does it affect?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: principles
    attributes:
      label: Product fit
      options:
        - label: This keeps Weeklight local-first and privacy-conscious.
          required: true
        - label: I searched existing issues for a similar request.
          required: true
