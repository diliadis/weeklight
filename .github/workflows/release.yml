name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch: arm64
          - runner: macos-26-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate release version
        id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Tag must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease format" >&2
            exit 1
          fi

          release_version="${GITHUB_REF_NAME#v}"
          app_version="${release_version%%-*}"
          source_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Support/Info.plist)"
          if [[ "$source_version" != "$app_version" ]]; then
            echo "Support/Info.plist is version $source_version; expected $app_version for $GITHUB_REF_NAME" >&2
            exit 1
          fi

          echo "app-version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: swift --version

      - name: Run Swift tests
        run: swift test

      - name: Run regression harness
        run: ./Scripts/verify.sh

      - name: Build application bundle
        env:
          WEEKLIGHT_VERSION: ${{ steps.version.outputs.app-version }}
          WEEKLIGHT_BUILD_NUMBER: ${{ github.run_number }}
        run: ./Scripts/build-app.sh

      - name: Validate application bundle
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
          EXPECTED_VERSION: ${{ steps.version.outputs.app-version }}
          EXPECTED_BUILD: ${{ github.run_number }}
        run: |
          info_plist="dist/Weeklight.app/Contents/Info.plist"
          binary="dist/Weeklight.app/Contents/MacOS/Weeklight"

          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$info_plist")" = "$EXPECTED_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$info_plist")" = "$EXPECTED_BUILD"
          codesign --verify --deep --strict dist/Weeklight.app

          architectures="$(lipo -archs "$binary")"
          if [[ " $architectures " != *" $EXPECTED_ARCH "* ]]; then
            echo "Expected $EXPECTED_ARCH binary, found: $architectures" >&2
            exit 1
          fi

      - name: Package release asset
        run: ./Scripts/package-release.sh "$GITHUB_REF_NAME" "${{ matrix.arch }}"

      - name: Attest release archive
        uses: actions/attest@v4
        with:
          subject-path: release/Weeklight-${{ github.ref_name }}-macos-${{ matrix.arch }}.zip

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          release_arguments=(
            release create "$GITHUB_REF_NAME"
            release/*.zip
            release/*.sha256
            --verify-tag
            --generate-notes
            --title "Weeklight $GITHUB_REF_NAME"
          )

          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_arguments+=(--prerelease)
          fi

          gh "${release_arguments[@]}"
