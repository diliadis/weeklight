name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show toolchain
        run: swift --version

      - name: Run Swift tests
        run: swift test

      - name: Run regression harness
        run: ./Scripts/verify.sh

      - name: Build application bundle
        run: ./Scripts/build-app.sh

      - name: Validate application metadata
        run: |
          test -x dist/Weeklight.app/Contents/MacOS/Weeklight
          plutil -lint dist/Weeklight.app/Contents/Info.plist
          codesign --verify --deep --strict dist/Weeklight.app
